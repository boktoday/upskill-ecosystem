<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Progress – AI Agent Upskill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: system-ui, -apple-system, sans-serif; }
    body { background: linear-gradient(180deg, #FEF9EC 0%, #FFCD94 100%); min-height: 100vh; color: #3D3935; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .mod-card { animation: fadeUp 0.4s ease both; }
    .mod-card:nth-child(1) { animation-delay:0.05s; }
    .mod-card:nth-child(2) { animation-delay:0.1s; }
    .mod-card:nth-child(3) { animation-delay:0.15s; }
    .mod-card:nth-child(4) { animation-delay:0.2s; }
    .mod-card:nth-child(5) { animation-delay:0.25s; }
  </style>
</head>
<body>
  <div style="max-width:720px; margin:0 auto; padding:32px 16px;">

    <div style="text-align:center; margin-bottom:24px;">
  <span style="display:inline-flex; align-items:center; gap:6px; background:#F0839D; color:#fff; padding:5px 14px; border-radius:20px; font-size:12px; font-weight:600;">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    AI Agent Upskill
  </span>
</div>

    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="font-size:clamp(26px,5vw,40px); font-weight:900; color:#3D3935; line-height:1.1; margin-bottom:8px;">Your Learning Journey</h1>
      <p style="color:#555555; font-size:14px;">Track your progress across all 5 modules</p>
    </div>

    <!-- Overall -->
    <div style="background:#FFFFFF; border-radius:24px; padding:24px 22px; margin-bottom:24px; box-shadow:0 4px 24px rgba(240,131,157,0.15); border-top:4px solid #F0839D;">
      <h2 style="font-size:18px; font-weight:800; color:#3D3935; margin-bottom:16px;">Overall Progress</h2>
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:10px;">
        <div style="flex:1; background:#FEF9EC; border-radius:999px; height:14px; overflow:hidden;">
          <div id="total-bar" style="background:linear-gradient(90deg,#F0839D,#F4A261); height:100%; width:0%; border-radius:999px; transition:width 1.2s ease;"></div>
        </div>
        <span id="total-pct" style="font-size:26px; font-weight:900; color:#F0839D; min-width:56px; text-align:right;">0%</span>
      </div>
      <p id="total-label" style="color:#8DA6B0; font-size:12px;"></p>
    </div>

    <!-- Module cards -->
    <div style="display:grid; gap:14px;" id="module-list"></div>

    <!-- Bonus: Maton API Gateway -->
    <div style="background:#FFFFFF; border-radius:16px; padding:18px 20px; box-shadow:0 2px 12px rgba(240,131,157,0.1); border-left:4px solid #F4A261; margin-top:6px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
        <span style="font-size:26px;">🔌</span>
        <div style="flex:1;">
          <h3 style="font-weight:700; color:#3D3935; font-size:14px; line-height:1.3;">Bonus: Maton API Gateway</h3>
          <p style="color:#8DA6B0; font-size:11px;">Connect OpenClaw to 100+ services</p>
        </div>
        <span style="background:rgba(244,162,97,0.15); color:#F4A261; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:700;">Bonus</span>
      </div>
      <a href="maton-api-gateway.html" style="display:block; text-align:center; background:#F4A261; color:#FFFFFF; padding:9px; border-radius:10px; font-size:13px; font-weight:700; text-decoration:none;">View Tutorial →</a>
    </div>

    <div style="text-align:center; margin-top:36px;">
      <p style="color:rgba(61,57,53,0.35); font-size:12px;">AI Agent Upskill · Built with OpenClaw</p>
    </div>
  </div>

  <script>
    var MODULES = [
      { name:"The Agentic Revolution",          time:"45 min",   icon:"🤖", quiz:"quiz-module-1.html",       cards:"flashcards-module-1.html" },
      { name:"The Tech Stack of 2026",          time:"45 min",   icon:"⚡", quiz:"quiz-module-2.html",       cards:"flashcards-module-2.html" },
      { name:"Deep Dive into OpenClaw",         time:"60 min",   icon:"🔧", quiz:"quiz-module-3.html",       cards:"flashcards-module-3.html" },
      { name:"Strategy, Ethics & Application",   time:"30 min",   icon:"🎯", quiz:"quiz-module-4.html",       cards:"flashcards-module-4.html" },
      { name:"Knowledge Check & Practice",       time:"Variable",  icon:"✅", quiz:"quiz-module-5.html",       cards:"flashcards-module-5.html" },
    ];

    var saved = JSON.parse(localStorage.getItem('quizScores') || '{}');

    function pct(s) { return Math.round((s/5)*100); }

    function render() {
      var list = document.getElementById('module-list');
      var totalPct = 0, done = 0;
      list.innerHTML = MODULES.map(function(m,i) {
        var s = saved['q'+i] || 0;
        var p = pct(s);
        totalPct += p;
        if (p >= 60) done++;
        var doneColor = p >= 60 ? '#8DA6B0' : '#F0839D';
        var doneBg    = p >= 60 ? '#8DA6B0' : '#FEF9EC';
        var doneText  = p >= 60 ? '#fff' : '#F0839D';
        return '<div class="mod-card" style="background:#FFFFFF; border-radius:16px; padding:18px 20px; box-shadow:0 2px 12px rgba(240,131,157,0.1); border-left:4px solid '+doneColor+';">' +
          '<div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">' +
          '<span style="font-size:26px;">'+m.icon+'</span>' +
          '<div style="flex:1;"><h3 style="font-weight:700; color:#3D3935; font-size:14px; line-height:1.3;">'+m.name+'</h3><p style="color:#8DA6B0; font-size:11px;">'+m.time+'</p></div>' +
          '<span style="background:'+doneBg+'; color:'+doneText+'; padding:4px 12px; border-radius:999px; font-size:13px; font-weight:700; white-space:nowrap;">'+(p>=60?'✓ Done':'('+s+'/5)')+'</span>' +
          '</div>' +
          '<div style="background:#FEF9EC; border-radius:999px; height:8px; overflow:hidden; margin-bottom:12px;">' +
          '<div style="background:'+doneColor+'; height:100%; width:'+p+'%; border-radius:999px;"></div>' +
          '</div>' +
          '<div style="display:flex; gap:8px;">' +
          '<a href="'+m.cards+'" style="flex:1; text-align:center; background:#FEF9EC; color:#F0839D; padding:8px; border-radius:10px; font-size:13px; font-weight:600; text-decoration:none;">Flashcards</a>' +
          '<a href="'+m.quiz+'"  style="flex:1; text-align:center; background:#F0839D;  color:#FFFFFF; padding:8px; border-radius:10px; font-size:13px; font-weight:600; text-decoration:none;">Take Quiz</a>' +
          '</div></div>';
      }).join('');

      var avg = Math.round(totalPct / MODULES.length);
      document.getElementById('total-bar').style.width = avg + '%';
      document.getElementById('total-pct').textContent  = avg + '%';
      document.getElementById('total-label').textContent =
        done === MODULES.length
          ? 'All modules complete — you are ready to graduate!'
          : done + ' of ' + MODULES.length + ' modules passed (60%+ score required)';
    }

    render();
  </script>
</body>
</html>
