<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen text-white p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 text-center">📊 Your Learning Progress</h1>
    
    <!-- Overall Progress -->
    <div class="mb-8">
      <div class="flex justify-between mb-2">
        <span>Overall Progress</span>
        <span>20%</span>
      </div>
      <div class="w-full bg-slate-700 rounded-full h-4">
        <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-4 rounded-full" style="width: 20%"></div>
      </div>
    </div>
    
    <!-- Module Progress -->
    <h2 class="text-xl font-bold mb-4">Modules</h2>
    
        <div class="flex items-center justify-between p-3 bg-slate-800 rounded mb-2">
          <span>✅ module-1</span>
          <span class="text-yellow-400">87%</span>
        </div>

    
    <!-- Quick Actions -->
    <div class="mt-8 grid grid-cols-2 gap-4">
      <a href="flashcards.html?student=student-001" class="block text-center bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg">
        🧠 Flashcards
      </a>
      <a href="quiz.html?student=student-001" class="block text-center bg-green-600 hover:bg-green-700 py-3 rounded-lg">
        📝 Take Quiz
      </a>
    </div>
  </div>
</body>
</html>
