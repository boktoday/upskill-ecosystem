<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Learning Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen text-white p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 text-center">📊 Your AI Learning Progress</h1>
    
    <div class="space-y-6">
      <div class="bg-slate-800 rounded-xl p-6">
        <div class="flex justify-between mb-2">
          <span class="font-semibold">Module 1: Agentic Revolution</span>
          <span class="text-green-400">✓ Complete</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-4">
          <div class="bg-green-500 h-4 rounded-full" style="width: 100%"></div>
        </div>
      </div>
      
      <div class="bg-slate-800 rounded-xl p-6">
        <div class="flex justify-between mb-2">
          <span class="font-semibold">Module 2: Tech Stack 2026</span>
          <span class="text-yellow-400">In Progress</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-4">
          <div class="bg-yellow-500 h-4 rounded-full" style="width: 60%"></div>
        </div>
      </div>
      
      <div class="bg-slate-800 rounded-xl p-6">
        <div class="flex justify-between mb-2">
          <span class="font-semibold">Module 3: Deep Dive OpenClaw</span>
          <span class="text-slate-400">Not Started</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-4">
          <div class="bg-slate-600 h-4 rounded-full" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="bg-slate-800 rounded-xl p-6">
        <div class="flex justify-between mb-2">
          <span class="font-semibold">Module 4: Strategy & Ethics</span>
          <span class="text-slate-400">Not Started</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-4">
          <div class="bg-slate-600 h-4 rounded-full" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="bg-slate-800 rounded-xl p-6">
        <div class="flex justify-between mb-2">
          <span class="font-semibold">Module 5: Knowledge Check</span>
          <span class="text-slate-400">Not Started</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-4">
          <div class="bg-slate-600 h-4 rounded-full" style="width: 0%"></div>
        </div>
      </div>
    </div>
    
    <div class="mt-8 text-center">
      <p class="text-2xl font-bold">Overall: 20% Complete</p>
    </div>
  </div>
</body>
</html>
